################################################################################
# Auto-generated from pr-test.yml.j2 — do not edit manually.
################################################################################
name: PR Test

on:
  pull_request:
    types: [opened, labeled, synchronize]
    paths: ['**/*.py']
  workflow_dispatch:

concurrency:
  group: pr-test-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ github.event.pull_request.head.sha }}

      has_qwen3_dense: ${{ steps.detect.outputs.has_qwen3_dense }}
      has_qwen3_moe: ${{ steps.detect.outputs.has_qwen3_moe }}
      has_gpt_oss: ${{ steps.detect.outputs.has_gpt_oss }}

    steps:
      - name: Detect changed files
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });
            const filenames = files.map(f => f.filename);

            const has_qwen3_dense = filenames.some(f =>
              ["qwen3/", "tests/qwen3/"].some(d => f.startsWith(d)) &&
              !["qwen3_moe/", "tests/qwen3_moe/"].some(d => f.startsWith(d))
            );
            core.setOutput('has_qwen3_dense', has_qwen3_dense);

            const has_qwen3_moe = filenames.some(f =>
              ["qwen3_moe/", "tests/qwen3_moe/"].some(d => f.startsWith(d))
            );
            core.setOutput('has_qwen3_moe', has_qwen3_moe);

            const has_gpt_oss = filenames.some(f =>
              ["gpt_oss/", "tests/gpt_oss/"].some(d => f.startsWith(d))
            );
            core.setOutput('has_gpt_oss', has_gpt_oss);


      - name: Add labels to PR
        if: github.event.action == 'synchronize'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const ciLabels = [];

            if ('${{ steps.detect.outputs.has_qwen3_dense }}' === 'true')
              ciLabels.push('run-ci-qwen3-dense');

            if ('${{ steps.detect.outputs.has_qwen3_moe }}' === 'true')
              ciLabels.push('run-ci-qwen3-moe');

            if ('${{ steps.detect.outputs.has_gpt_oss }}' === 'true')
              ciLabels.push('run-ci-gpt-oss');

            if (ciLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ciLabels
              });
            }


  knowledge-qwen3-dense-cpu:
    name: "CPU / knowledge-qwen3-dense"
    needs: prepare
    if: >-
      needs.prepare.outputs.has_qwen3_dense == 'true'
      || contains(github.event.pull_request.labels.*.name, 'run-ci-qwen3-dense')
    runs-on: [self-hosted]
    strategy:
      fail-fast: false
      matrix:
        model: ["Qwen3-0.6B", "Qwen3-1.7B", "Qwen3-4B", "Qwen3-8B", "Qwen3-14B", "Qwen3-32B"]
    env:
      HF_HOME: /media/hdddisk/.cache/huggingface
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra test

      - name: Download checkpoint
        run: |
          persistent="${{ runner.tool_cache }}/huggingface/${{ matrix.model }}"
          if [ ! -f "$persistent/config.json" ]; then
            uv run hf download Qwen/${{ matrix.model }} --local-dir "$persistent"
          fi
          mkdir -p checkpoints
          ln -sfn "$persistent" checkpoints/${{ matrix.model }}

      - name: Run tests
        run: uv run pytest tests/qwen3/test_knowledge.py -m slow -v -s --model ${{ matrix.model }} --device cpu


