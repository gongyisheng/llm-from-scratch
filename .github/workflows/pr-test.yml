################################################################################
# Auto-generated from pr-test.yml.j2 — do not edit manually.
################################################################################
name: PR Test

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: read
  issues: write
  actions: write
  contents: read
  statuses: write

jobs:
  prepare:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '/run-ci'
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.detect.outputs.head_sha }}

      has_qwen3: ${{ steps.detect.outputs.has_qwen3 }}
      has_qwen3_moe: ${{ steps.detect.outputs.has_qwen3_moe }}

    steps:
      - name: Detect changed files
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            core.setOutput('head_sha', pr.head.sha);

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });
            const filenames = files.map(f => f.filename);

            const has_qwen3 = filenames.some(f =>
              ["qwen3/", "tests/qwen3/"].some(d => f.startsWith(d)) &&
              !["qwen3_moe/", "tests/qwen3_moe/"].some(d => f.startsWith(d))
            );
            core.setOutput('has_qwen3', has_qwen3);

            const has_qwen3_moe = filenames.some(f =>
              ["qwen3_moe/", "tests/qwen3_moe/"].some(d => f.startsWith(d))
            );
            core.setOutput('has_qwen3_moe', has_qwen3_moe);


      - name: Set pending statuses on PR
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ steps.detect.outputs.head_sha }}';
            const url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const checks = [];

            if ('${{ steps.detect.outputs.has_qwen3 }}' === 'true') {

              checks.push('CI / test-qwen3-cpu (Qwen3-0.6B)');

              checks.push('CI / test-qwen3-cpu (Qwen3-1.7B)');

              checks.push('CI / test-qwen3-cpu (Qwen3-4B)');

              checks.push('CI / test-qwen3-cpu (Qwen3-8B)');

              checks.push('CI / test-qwen3-cpu (Qwen3-14B)');

              checks.push('CI / test-qwen3-cpu (Qwen3-32B)');

            }

            if ('${{ steps.detect.outputs.has_qwen3 }}' === 'true') {

              checks.push('CI / test-qwen3-cuda (Qwen3-0.6B)');

              checks.push('CI / test-qwen3-cuda (Qwen3-1.7B)');

              checks.push('CI / test-qwen3-cuda (Qwen3-4B)');

            }

            if ('${{ steps.detect.outputs.has_qwen3_moe }}' === 'true') {

              checks.push('CI / test-qwen3-moe-cpu (Qwen3-30B-A3B)');

            }

            for (const name of checks) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state: 'pending',
                context: name,
                description: 'Queued',
                target_url: url
              });
            }

      - name: Add labels to PR
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const ciLabels = [];

            if ('${{ steps.detect.outputs.has_qwen3 }}' === 'true')
              ciLabels.push('run-ci-qwen3');

            if ('${{ steps.detect.outputs.has_qwen3_moe }}' === 'true')
              ciLabels.push('run-ci-qwen3-moe');

            if (ciLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ciLabels
              });
            }


  test-qwen3-cpu:
    needs: prepare
    if: needs.prepare.outputs.has_qwen3 == 'true'
    runs-on: [self-hosted]
    strategy:
      fail-fast: false
      matrix:
        model: ["Qwen3-0.6B", "Qwen3-1.7B", "Qwen3-4B", "Qwen3-8B", "Qwen3-14B", "Qwen3-32B"]
    env:
      HF_HOME: /media/hdddisk/.cache/huggingface
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra test --extra download

      - name: Download checkpoint
        run: uv run bash scripts/download.sh Qwen/${{ matrix.model }}

      - name: Run tests
        run: uv run pytest tests/qwen3/ -m slow -v --model ${{ matrix.model }} --device cpu

      - name: Report status
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo,
              sha: '${{ needs.prepare.outputs.head_sha }}',
              state: status === 'success' ? 'success' : 'failure',
              context: 'CI / test-qwen3-cpu (${{ matrix.model }})',
              description: status === 'success' ? 'Tests passed' : 'Tests failed',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });


  test-qwen3-cuda:
    needs: prepare
    if: needs.prepare.outputs.has_qwen3 == 'true'
    runs-on: [self-hosted]
    strategy:
      fail-fast: false
      matrix:
        model: ["Qwen3-0.6B", "Qwen3-1.7B", "Qwen3-4B"]
    env:
      HF_HOME: /media/hdddisk/.cache/huggingface
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra test --extra download

      - name: Download checkpoint
        run: uv run bash scripts/download.sh Qwen/${{ matrix.model }}

      - name: Run tests
        run: uv run pytest tests/qwen3/ -m slow -v --model ${{ matrix.model }} --device cuda

      - name: Report status
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo,
              sha: '${{ needs.prepare.outputs.head_sha }}',
              state: status === 'success' ? 'success' : 'failure',
              context: 'CI / test-qwen3-cuda (${{ matrix.model }})',
              description: status === 'success' ? 'Tests passed' : 'Tests failed',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });


  test-qwen3-moe-cpu:
    needs: prepare
    if: needs.prepare.outputs.has_qwen3_moe == 'true'
    runs-on: [self-hosted]
    strategy:
      fail-fast: false
      matrix:
        model: ["Qwen3-30B-A3B"]
    env:
      HF_HOME: /media/hdddisk/.cache/huggingface
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra test --extra download

      - name: Download checkpoint
        run: uv run bash scripts/download.sh Qwen/${{ matrix.model }}

      - name: Run tests
        run: uv run pytest tests/qwen3_moe/ -m slow -v --model ${{ matrix.model }} --device cpu

      - name: Report status
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo,
              sha: '${{ needs.prepare.outputs.head_sha }}',
              state: status === 'success' ? 'success' : 'failure',
              context: 'CI / test-qwen3-moe-cpu (${{ matrix.model }})',
              description: status === 'success' ? 'Tests passed' : 'Tests failed',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
