name: Slash Run CI

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: read
  issues: write
  actions: write
  contents: read
  statuses: write

jobs:
  prepare:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '/run-ci'
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.detect.outputs.head_sha }}
      has_qwen3: ${{ steps.detect.outputs.has_qwen3 }}
      has_qwen3_moe: ${{ steps.detect.outputs.has_qwen3_moe }}
    steps:
      - name: Detect changed files
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            core.setOutput('head_sha', pr.head.sha);

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });
            const filenames = files.map(f => f.filename);
            const hasQwen3 = filenames.some(f =>
              (f.startsWith('qwen3/') || f.startsWith('tests/qwen3/')) &&
              !f.startsWith('qwen3_moe/') && !f.startsWith('tests/qwen3_moe/')
            );
            const hasQwen3Moe = filenames.some(f =>
              f.startsWith('qwen3_moe/') || f.startsWith('tests/qwen3_moe/')
            );

            core.setOutput('has_qwen3', hasQwen3);
            core.setOutput('has_qwen3_moe', hasQwen3Moe);

      - name: Set pending status on PR
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ steps.detect.outputs.head_sha }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: 'pending',
              context: 'Slash Run CI',
              description: 'CI triggered by /run-ci',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Add labels to PR
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const hasQwen3 = '${{ steps.detect.outputs.has_qwen3 }}' === 'true';
            const hasQwen3Moe = '${{ steps.detect.outputs.has_qwen3_moe }}' === 'true';
            const ciLabels = [];
            if (hasQwen3) ciLabels.push('run-ci-qwen3');
            if (hasQwen3Moe) ciLabels.push('run-ci-qwen3-moe');
            if (ciLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ciLabels
              });
            }

  test-qwen3-cpu:
    needs: prepare
    if: needs.prepare.outputs.has_qwen3 == 'true'
    uses: ./.github/workflows/test.yml
    with:
      models: '["Qwen3-0.6B","Qwen3-1.7B","Qwen3-4B","Qwen3-8B","Qwen3-14B","Qwen3-32B"]'
      device: cpu
      test_dir: tests/qwen3/
      pr_sha: ${{ needs.prepare.outputs.head_sha }}

  test-qwen3-cuda:
    needs: prepare
    if: needs.prepare.outputs.has_qwen3 == 'true'
    uses: ./.github/workflows/test.yml
    with:
      models: '["Qwen3-0.6B","Qwen3-1.7B","Qwen3-4B"]'
      device: cuda
      test_dir: tests/qwen3/
      pr_sha: ${{ needs.prepare.outputs.head_sha }}

  test-qwen3-moe-cpu:
    needs: prepare
    if: needs.prepare.outputs.has_qwen3_moe == 'true'
    uses: ./.github/workflows/test.yml
    with:
      models: '["Qwen3-30B-A3B"]'
      device: cpu
      test_dir: tests/qwen3_moe/
      pr_sha: ${{ needs.prepare.outputs.head_sha }}

  report-status:
    needs: [prepare, test-qwen3-cpu, test-qwen3-cuda, test-qwen3-moe-cpu]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Report final status
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const results = [
              '${{ needs.test-qwen3-cpu.result }}',
              '${{ needs.test-qwen3-cuda.result }}',
              '${{ needs.test-qwen3-moe-cpu.result }}'
            ].filter(r => r !== 'skipped');
            const failed = results.some(r => r === 'failure');
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ needs.prepare.outputs.head_sha }}',
              state: failed ? 'failure' : 'success',
              context: 'Slash Run CI',
              description: failed ? 'CI failed' : 'CI passed',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
