name: Slash Run CI

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: read
  issues: write
  actions: write
  contents: read

jobs:
  prepare:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '/run-ci'
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.label.outputs.head_sha }}
      has_qwen3: ${{ steps.label.outputs.has_qwen3 }}
      has_qwen3_moe: ${{ steps.label.outputs.has_qwen3_moe }}
    steps:
      - name: React with eyes
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Add labels based on changed files
        id: label
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            core.setOutput('head_sha', pr.head.sha);

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });
            const filenames = files.map(f => f.filename);
            const hasQwen3 = filenames.some(f =>
              (f.startsWith('qwen3/') || f.startsWith('tests/qwen3/')) &&
              !f.startsWith('qwen3_moe/') && !f.startsWith('tests/qwen3_moe/')
            );
            const hasQwen3Moe = filenames.some(f =>
              f.startsWith('qwen3_moe/') || f.startsWith('tests/qwen3_moe/')
            );

            const ciLabels = [];
            if (hasQwen3) ciLabels.push('run-ci-qwen3');
            if (hasQwen3Moe) ciLabels.push('run-ci-qwen3-moe');

            if (ciLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ciLabels
              });
            }

            core.setOutput('has_qwen3', hasQwen3);
            core.setOutput('has_qwen3_moe', hasQwen3Moe);

  test-qwen3-cpu:
    needs: prepare
    if: needs.prepare.outputs.has_qwen3 == 'true'
    uses: ./.github/workflows/test.yml
    with:
      models: '["Qwen3-0.6B","Qwen3-1.7B","Qwen3-4B","Qwen3-8B","Qwen3-14B","Qwen3-32B"]'
      device: cpu
      test_dir: tests/qwen3/
      pr_sha: ${{ needs.prepare.outputs.head_sha }}

  test-qwen3-cuda:
    needs: prepare
    if: needs.prepare.outputs.has_qwen3 == 'true'
    uses: ./.github/workflows/test.yml
    with:
      models: '["Qwen3-0.6B","Qwen3-1.7B","Qwen3-4B"]'
      device: cuda
      test_dir: tests/qwen3/
      pr_sha: ${{ needs.prepare.outputs.head_sha }}

  test-qwen3-moe-cpu:
    needs: prepare
    if: needs.prepare.outputs.has_qwen3_moe == 'true'
    uses: ./.github/workflows/test.yml
    with:
      models: '["Qwen3-30B-A3B"]'
      device: cpu
      test_dir: tests/qwen3_moe/
      pr_sha: ${{ needs.prepare.outputs.head_sha }}
