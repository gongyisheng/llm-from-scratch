name: Slash Run CI

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: read
  issues: write
  actions: write
  contents: read
  statuses: write

jobs:
  prepare:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '/run-ci'
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.detect.outputs.head_sha }}
      has_qwen3: ${{ steps.detect.outputs.has_qwen3 }}
      has_qwen3_moe: ${{ steps.detect.outputs.has_qwen3_moe }}
    steps:
      - name: Detect changed files
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            core.setOutput('head_sha', pr.head.sha);

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });
            const filenames = files.map(f => f.filename);
            const hasQwen3 = filenames.some(f =>
              (f.startsWith('qwen3/') || f.startsWith('tests/qwen3/')) &&
              !f.startsWith('qwen3_moe/') && !f.startsWith('tests/qwen3_moe/')
            );
            const hasQwen3Moe = filenames.some(f =>
              f.startsWith('qwen3_moe/') || f.startsWith('tests/qwen3_moe/')
            );

            core.setOutput('has_qwen3', hasQwen3);
            core.setOutput('has_qwen3_moe', hasQwen3Moe);

      - name: Set pending statuses on PR
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ steps.detect.outputs.head_sha }}';
            const hasQwen3 = '${{ steps.detect.outputs.has_qwen3 }}' === 'true';
            const hasQwen3Moe = '${{ steps.detect.outputs.has_qwen3_moe }}' === 'true';
            const url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const checks = [];
            if (hasQwen3) {
              checks.push('CI / test-qwen3-cpu');
              checks.push('CI / test-qwen3-cuda');
            }
            if (hasQwen3Moe) {
              checks.push('CI / test-qwen3-moe-cpu');
            }
            for (const name of checks) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state: 'pending',
                context: name,
                description: 'Queued',
                target_url: url
              });
            }

      - name: Add labels to PR
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const hasQwen3 = '${{ steps.detect.outputs.has_qwen3 }}' === 'true';
            const hasQwen3Moe = '${{ steps.detect.outputs.has_qwen3_moe }}' === 'true';
            const ciLabels = [];
            if (hasQwen3) ciLabels.push('run-ci-qwen3');
            if (hasQwen3Moe) ciLabels.push('run-ci-qwen3-moe');
            if (ciLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ciLabels
              });
            }

  test-qwen3-cpu:
    needs: prepare
    if: needs.prepare.outputs.has_qwen3 == 'true'
    uses: ./.github/workflows/test.yml
    with:
      models: '["Qwen3-0.6B","Qwen3-1.7B","Qwen3-4B","Qwen3-8B","Qwen3-14B","Qwen3-32B"]'
      device: cpu
      test_dir: tests/qwen3/
      pr_sha: ${{ needs.prepare.outputs.head_sha }}

  test-qwen3-cuda:
    needs: prepare
    if: needs.prepare.outputs.has_qwen3 == 'true'
    uses: ./.github/workflows/test.yml
    with:
      models: '["Qwen3-0.6B","Qwen3-1.7B","Qwen3-4B"]'
      device: cuda
      test_dir: tests/qwen3/
      pr_sha: ${{ needs.prepare.outputs.head_sha }}

  test-qwen3-moe-cpu:
    needs: prepare
    if: needs.prepare.outputs.has_qwen3_moe == 'true'
    uses: ./.github/workflows/test.yml
    with:
      models: '["Qwen3-30B-A3B"]'
      device: cpu
      test_dir: tests/qwen3_moe/
      pr_sha: ${{ needs.prepare.outputs.head_sha }}

  report-qwen3-cpu:
    needs: [prepare, test-qwen3-cpu]
    if: always() && needs.test-qwen3-cpu.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const result = '${{ needs.test-qwen3-cpu.result }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo,
              sha: '${{ needs.prepare.outputs.head_sha }}',
              state: result === 'success' ? 'success' : 'failure',
              context: 'CI / test-qwen3-cpu',
              description: result === 'success' ? 'Tests passed' : 'Tests failed',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

  report-qwen3-cuda:
    needs: [prepare, test-qwen3-cuda]
    if: always() && needs.test-qwen3-cuda.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const result = '${{ needs.test-qwen3-cuda.result }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo,
              sha: '${{ needs.prepare.outputs.head_sha }}',
              state: result === 'success' ? 'success' : 'failure',
              context: 'CI / test-qwen3-cuda',
              description: result === 'success' ? 'Tests passed' : 'Tests failed',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

  report-qwen3-moe-cpu:
    needs: [prepare, test-qwen3-moe-cpu]
    if: always() && needs.test-qwen3-moe-cpu.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const result = '${{ needs.test-qwen3-moe-cpu.result }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo,
              sha: '${{ needs.prepare.outputs.head_sha }}',
              state: result === 'success' ? 'success' : 'failure',
              context: 'CI / test-qwen3-moe-cpu',
              description: result === 'success' ? 'Tests passed' : 'Tests failed',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
