name: Test Qwen3 (CPU)

on:
  push:
    tags: ['run-ci-qwen3']
  issue_comment:
    types: [created]

jobs:
  test:
    if: >
      github.event_name == 'push' ||
      (github.event.issue.pull_request &&
       contains(github.event.comment.body, '/run-ci-qwen3') &&
       !contains(github.event.comment.body, '/run-ci-qwen3-moe'))
    runs-on: [self-hosted]
    strategy:
      fail-fast: false
      matrix:
        model: [Qwen3-0.6B, Qwen3-1.7B, Qwen3-4B, Qwen3-8B, Qwen3-14B, Qwen3-32B]
    env:
      HF_HOME: /media/hdddisk/.cache/huggingface
    steps:
      - name: Get PR head SHA
        if: github.event_name == 'issue_comment'
        id: pr
        run: echo "sha=$(gh pr view ${{ github.event.issue.number }} --json headRefOid -q .headRefOid)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set pending status
        if: github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.sha }} \
            -f state=pending \
            -f context="Test Qwen3 (CPU) / ${{ matrix.model }}" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra test --extra download

      - name: Download checkpoint
        run: uv run bash scripts/download.sh Qwen/${{ matrix.model }}

      - name: Run tests
        run: uv run pytest tests/qwen3/ -m slow -v --model ${{ matrix.model }} --device cpu

      - name: Set final status
        if: always() && github.event_name == 'issue_comment'
        run: |
          STATE=${{ job.status == 'success' && 'success' || 'failure' }}
          gh api repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.sha }} \
            -f state="$STATE" \
            -f context="Test Qwen3 (CPU) / ${{ matrix.model }}" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ github.token }}
