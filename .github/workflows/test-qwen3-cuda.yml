name: Test Qwen3 (Nvidia)

on:
  pull_request:
    types: [labeled]

jobs:
  test:
    if: github.event.label.name == 'run-ci-qwen3'
    runs-on: [self-hosted]
    strategy:
      fail-fast: false
      matrix:
        model: [Qwen3-0.6B, Qwen3-1.7B, Qwen3-4B]
    env:
      HF_HOME: /media/hdddisk/.cache/huggingface
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra test --extra download

      - name: Download checkpoint
        run: uv run bash scripts/download.sh Qwen/${{ matrix.model }}

      - name: Run tests
        run: uv run pytest tests/qwen3/ -m slow -v --model ${{ matrix.model }} --device cuda
