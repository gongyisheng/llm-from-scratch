name: Test Qwen3-MoE (CPU)

on:
  push:
    tags: ['run-ci-qwen3-moe']
  issue_comment:
    types: [created]

jobs:
  test:
    if: >
      github.event_name == 'push' ||
      (github.event.issue.pull_request &&
       contains(github.event.comment.body, '/run-ci-qwen3-moe'))
    runs-on: [self-hosted]
    strategy:
      fail-fast: false
      matrix:
        model: [Qwen3-30B-A3B]
    env:
      HF_HOME: /media/hdddisk/.cache/huggingface
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra test --extra download

      - name: Download checkpoint
        run: uv run huggingface-cli download Qwen/${{ matrix.model }} --local-dir checkpoints/${{ matrix.model }}

      - name: Run tests
        run: uv run pytest tests/qwen3_moe/ -m slow -v --model ${{ matrix.model }} --device cpu
