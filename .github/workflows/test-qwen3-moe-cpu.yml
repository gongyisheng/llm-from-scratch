name: Test Qwen3-MoE (CPU)

on:
  push:
    tags: ['run-ci-qwen3-moe']

jobs:
  test:
    runs-on: [self-hosted]
    strategy:
      fail-fast: false
      matrix:
        model: [Qwen3-30B-A3B]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra test --extra download

      - name: Download checkpoint
        run: bash scripts/download.sh Qwen/${{ matrix.model }}

      - name: Run tests
        run: uv run pytest tests/qwen3_moe/ -m slow -v --model ${{ matrix.model }} --device cpu
